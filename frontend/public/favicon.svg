<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="64" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="64" height="64" rx="16" fill="url(#shine)"/>

  <!-- Robot head body -->
  <rect x="18" y="22" width="28" height="22" rx="5" fill="white" fill-opacity="0.95"/>

  <!-- Antenna -->
  <line x1="32" y1="22" x2="32" y2="14" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="32" cy="12" r="3" fill="white"/>

  <!-- Eyes -->
  <circle cx="25" cy="31" r="4" fill="#dc2626"/>
  <circle cx="26.5" cy="29.5" r="1.2" fill="white" fill-opacity="0.7"/>

  <circle cx="39" cy="31" r="4" fill="#dc2626"/>
  <circle cx="40.5" cy="29.5" r="1.2" fill="white" fill-opacity="0.7"/>

  <!-- Mouth -->
  <rect x="25" y="37" width="14" height="3" rx="1.5" fill="#dc2626" fill-opacity="0.7"/>

  <!-- Ears -->
  <rect x="12" y="27" width="6" height="8" rx="3" fill="white" fill-opacity="0.6"/>
  <rect x="46" y="27" width="6" height="8" rx="3" fill="white" fill-opacity="0.6"/>
</svg>
