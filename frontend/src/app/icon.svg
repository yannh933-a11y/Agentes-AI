<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8e4f0"/>
    </linearGradient>
    <linearGradient id="circle" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>

  <!-- Fundo claro com cantos arredondados -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Círculo vermelho central -->
  <circle cx="32" cy="32" r="24" fill="url(#circle)"/>

  <!-- Robô branco -->
  <!-- Antena -->
  <line x1="32" y1="14" x2="32" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="13" r="2" fill="white"/>

  <!-- Cabeça -->
  <rect x="22" y="20" width="20" height="14" rx="4" fill="white"/>

  <!-- Olhos -->
  <circle cx="27" cy="27" r="2.5" fill="#dc2626"/>
  <circle cx="37" cy="27" r="2.5" fill="#dc2626"/>

  <!-- Corpo -->
  <rect x="24" y="36" width="16" height="10" rx="3" fill="white"/>

  <!-- Braços -->
  <rect x="18" y="37" width="5" height="8" rx="2.5" fill="white"/>
  <rect x="41" y="37" width="5" height="8" rx="2.5" fill="white"/>
</svg>
